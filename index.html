<script>
const DATA = [{"name": "Língua Portuguesa", "icon": "✍️", "color": "#3b82f6", "topics": [{"id": "lingua-portuguesa-interpretacao-de-textos", "title": "Interpretação de Textos", "explain": "Compreender textos é identificar informações explícitas, inferir ideias implícitas, reconhecer tema, tese, argumentos, finalidade e efeitos de sentido. Em prova, a banca costuma cobrar o que o texto autoriza afirmar, não o que parece correto fora dele. Leia o comando antes do texto, destaque palavras de restrição como 'sempre', 'apenas', 'exceto' e volte ao trecho exato. Diferencie tema, que é o assunto geral, de tese, que é a opinião defendida. Em textos narrativos, observe personagens, tempo, espaço e conflito; em textos argumentativos, procure ponto de vista, justificativas, exemplos e conclusão.", "summary": "Localize a informação no texto, identifique a ideia central, diferencie fato de opinião e cuidado com extrapolações.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Interpretação de Textos?", "a": "Localize a informação no texto, identifique a ideia central, diferencie fato de opinião e cuidado com extrapolações."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Interpretação+de+Textos+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Interpretação+de+Textos+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Interpretação+de+Textos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Interpretação+de+Textos+concurso+PMBA"}]}, {"id": "lingua-portuguesa-tipologia-e-generos-textuais", "title": "Tipologia e Gêneros Textuais", "explain": "Tipologia textual é a forma predominante de organização: narração, descrição, dissertação, exposição, injunção e argumentação. Gênero textual é o formato social: notícia, artigo, edital, carta, charge, propaganda, crônica. Na PMBA, é comum confundir gênero com tipo. Um artigo de opinião, por exemplo, é gênero; sua tipologia predominante é argumentativa. Observe finalidade comunicativa, linguagem, público-alvo e estrutura.", "summary": "Tipo é modo de organização; gênero é forma social de circulação do texto.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Tipologia e Gêneros Textuais?", "a": "Tipo é modo de organização; gênero é forma social de circulação do texto."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Tipologia+e+Gêneros+Textuais+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Tipologia+e+Gêneros+Textuais+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Tipologia+e+Gêneros+Textuais+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Tipologia+e+Gêneros+Textuais+concurso+PMBA"}]}, {"id": "lingua-portuguesa-ortografia-oficial", "title": "Ortografia Oficial", "explain": "Ortografia trata da escrita correta das palavras conforme o Vocabulário Ortográfico da Língua Portuguesa e o Acordo Ortográfico. Revise uso de s, ss, ç, x, ch, g, j, hífen, maiúsculas e minúsculas. Em questões, procure pares parecidos: seção/sessão/cessão, porque/por que/porquê/por quê, mal/mau, há/a. O estudo deve ser por grupos de palavras e resolução de questões, pois muitas regras são memorizadas pelo uso.", "summary": "Foque nos pares que a banca mais troca e no uso correto de hífen, porquês, mal/mau e há/a.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Ortografia Oficial?", "a": "Foque nos pares que a banca mais troca e no uso correto de hífen, porquês, mal/mau e há/a."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Ortografia+Oficial+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Ortografia+Oficial+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Ortografia+Oficial+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Ortografia+Oficial+concurso+PMBA"}]}, {"id": "lingua-portuguesa-acentuacao-grafica", "title": "Acentuação Gráfica", "explain": "Acentuação organiza a tonicidade das palavras. Oxítonas são acentuadas quando terminam em a, e, o, em, ens; paroxítonas seguem regra inversa e são acentuadas quando terminam em l, n, r, x, i, is, us, um, uns, ã, ãs, ão, ãos, ps, ditongo; proparoxítonas são sempre acentuadas. Monossílabos tônicos terminados em a, e, o, seguidos ou não de s, são acentuados. A banca também cobra hiatos, ditongos abertos e acentos diferenciais.", "summary": "Toda proparoxítona é acentuada; paroxítona tem regra inversa da oxítona.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Acentuação Gráfica?", "a": "Toda proparoxítona é acentuada; paroxítona tem regra inversa da oxítona."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Acentuação+Gráfica+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Acentuação+Gráfica+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Acentuação+Gráfica+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Acentuação+Gráfica+concurso+PMBA"}]}, {"id": "lingua-portuguesa-morfologia", "title": "Morfologia", "explain": "Morfologia estuda as classes de palavras: substantivo, artigo, adjetivo, numeral, pronome, verbo, advérbio, preposição, conjunção e interjeição. Para prova, o mais importante é reconhecer a função da palavra no contexto. Uma mesma palavra pode mudar de classe conforme o uso: 'o sim' transforma advérbio em substantivo; 'homem aranha' usa substantivo com valor adjetivo. Treine análise contextual, não apenas decore listas.", "summary": "Classe gramatical depende do contexto e da função da palavra na frase.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Morfologia?", "a": "Classe gramatical depende do contexto e da função da palavra na frase."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Morfologia+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Morfologia+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Morfologia+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Morfologia+concurso+PMBA"}]}, {"id": "lingua-portuguesa-verbos", "title": "Verbos", "explain": "Verbo indica ação, estado, fenômeno ou processo. Estude tempos e modos: indicativo expressa certeza, subjuntivo possibilidade/dúvida, imperativo ordem/pedido. Revise formas nominais, locuções verbais, verbos regulares, irregulares, defectivos e abundantes. Em questões de concordância e correlação verbal, observe o sujeito, o tempo da ação e a relação entre oração principal e subordinada.", "summary": "Identifique modo, tempo, pessoa, número e relação do verbo com o sujeito.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Verbos?", "a": "Identifique modo, tempo, pessoa, número e relação do verbo com o sujeito."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Verbos+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Verbos+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Verbos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Verbos+concurso+PMBA"}]}, {"id": "lingua-portuguesa-sintaxe-da-oracao", "title": "Sintaxe da Oração", "explain": "Sintaxe da oração analisa termos essenciais, integrantes e acessórios. Termos essenciais: sujeito e predicado. Integrantes: objeto direto, objeto indireto, complemento nominal e agente da passiva. Acessórios: adjunto adnominal, adjunto adverbial e aposto. O vocativo é termo independente. Em prova, pergunte ao verbo: quem pratica? o quê? a quem? de quê? Isso ajuda a localizar sujeito e complementos.", "summary": "Sujeito e predicado estruturam a oração; objetos completam verbos; adjuntos acrescentam circunstância ou caracterização.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Sintaxe da Oração?", "a": "Sujeito e predicado estruturam a oração; objetos completam verbos; adjuntos acrescentam circunstância ou caracterização."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Sintaxe+da+Oração+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Sintaxe+da+Oração+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Sintaxe+da+Oração+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Sintaxe+da+Oração+concurso+PMBA"}]}, {"id": "lingua-portuguesa-periodo-composto", "title": "Período Composto", "explain": "Período composto tem mais de uma oração. Pode ser por coordenação, quando as orações são independentes, ou por subordinação, quando uma depende da outra. Coordenadas podem ser aditivas, adversativas, alternativas, conclusivas ou explicativas. Subordinadas podem ser substantivas, adjetivas ou adverbiais. A classificação depende da função exercida pela oração no período.", "summary": "Coordenação tem independência; subordinação tem dependência sintática.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Período Composto?", "a": "Coordenação tem independência; subordinação tem dependência sintática."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Período+Composto+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Período+Composto+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Período+Composto+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Período+Composto+concurso+PMBA"}]}, {"id": "lingua-portuguesa-concordancia-verbal-e-nominal", "title": "Concordância Verbal e Nominal", "explain": "Concordância verbal é a relação do verbo com o sujeito; concordância nominal é a relação entre substantivo e seus determinantes. Atenção a sujeito composto, expressões partitivas, porcentagens, pronomes relativos e verbo haver com sentido de existir. Na nominal, revise casos como anexo, incluso, obrigado, mesmo, próprio, é proibido, é necessário e meio/meia.", "summary": "Ache o núcleo do sujeito ou do nome antes de concordar.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Concordância Verbal e Nominal?", "a": "Ache o núcleo do sujeito ou do nome antes de concordar."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Concordância+Verbal+e+Nominal+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Concordância+Verbal+e+Nominal+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Concordância+Verbal+e+Nominal+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Concordância+Verbal+e+Nominal+concurso+PMBA"}]}, {"id": "lingua-portuguesa-regencia-e-crase", "title": "Regência e Crase", "explain": "Regência trata da relação entre termos e preposições exigidas. Crase é a fusão da preposição 'a' o por vírgula; pontuação acompanha a estrutura sintática.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Pontuação?", "a": "Nunca separe sujeito do verbo por vírgula; pontuação acompanha a estrutura sintática."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Pontuação+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Pontuação+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Pontuação+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Pontuação+concurso+PMBA"}]}, {"id": "lingua-portuguesa-semantica", "title": "Semântica", "explain": "Semântica envolve sentido das palavras: sinonímia, antonímia, polissemia, homonímia, paronímia, denotação, conotação, ambiguidade e pressupostos. Em questões, o sentido depende do contexto. Uma palavra pode ter sentido literal ou figurado. Parônimos são parecidos na escrita e no som, mas diferentes no significado: iminente/eminente, ratificar/retificar.", "summary": "O sentido correto nasce do contexto; cuidado com palavras parecidas.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Semântica?", "a": "O sentido correto nasce do contexto; cuidado com palavras parecidas."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Semântica+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Semântica+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Semântica+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Semântica+concurso+PMBA"}]}]}, {"name": "Matemática e Raciocínio Lógico", "icon": "🧮", "color": "#10b981", "topics": [{"id": "matematica-e-raciocinio-logico-operacoes-fundamentais", "title": "Operações Fundamentais", "explain": "Revise soma, subtração, multiplicação, divisão, prioridade de operações e expressões numéricas. A ordem correta é: parênteses, potências/raízes, multiplicação/divisão e depois soma/subtração. Em concursos, erros comuns vêm de sinais negativos, distribuição e frações. Faça contas com atenção e confira estimativas para evitar resultado absurdo.", "summary": "Domine prioridade das operações e sinais antes de avançar.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Operações Fundamentais?", "a": "Domine prioridade das operações e sinais antes de avançar."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Operações+Fundamentais+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Operações+Fundamentais+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Operações+Fundamentais+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Operações+Fundamentais+concurso+PMBA"}]}, {"id": "matematica-e-raciocinio-logico-fracoes", "title": "Frações", "explain": "Fração representa parte de um todo ou razão entre grandezas. Para somar ou subtrair frações com denominadores diferentes, calcule o MMC, ajuste os numeradores e simplifique. Para multiplicar, multiplique numerador por numerador e denominador por denominador. Para dividir, conserve a primeira e multiplique pelo inverso da segunda. Em problemas, identifique o todo, a parte e a operação solicitada.", "summary": "Soma pede denominador comum; divisão usa inverso da segunda fração.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Frações?", "a": "Soma pede denominador comum; divisão usa inverso da segunda fração."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Frações+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Frações+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Frações+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Frações+concurso+PMBA"}]}, {"id": "matematica-e-raciocinio-logico-numeros-decimais", "title": "Números Decimais", "explain": "Números decimais aparecem em dinheiro, medidas e porcentagens. Para transformar fração em decimal, divida numerador por denominador. Para transformar decimal em fração, use casas decimais como denominador 10, 100, 1000 e simplifique. Na multiplicação, conte casas decimais; na divisão, iguale casas quando necessário.", "summary": "Decimal é fração com denominador decimal; atenção às casas.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Números Decimais?", "a": "Decimal é fração com denominador decimal; atenção às casas."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Números+Decimais+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Números+Decimais+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Números+Decimais+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Números+Decimais+concurso+PMBA"}]}, {"id": "matematica-e-raciocinio-logico-razao-e-proporcao", "title": "Razão e Proporção", "explain": "Razão compara grandezas por divisão. Proporção é igualdade entre razões. Em problemas, escreva as grandezas na mesma ordem e use multiplicação cruzada. Grandezas diretamente proporcionais aumentam ou diminuem juntas; inversamente proporcionais variam em sentidos opostos. Esse conteúdo é base para regra de três, escala e porcentagem.", "summary": "Mantenha a ordem das grandezas e identifique se a relação é direta ou inversa.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Razão e Proporção?", "a": "Mantenha a ordem das grandezas e identifique se a relação é direta ou inversa."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Razão+e+Proporção+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Razão+e+Proporção+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Razão+e+Proporção+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Razão+e+Proporção+concurso+PMBA"}]}, {"id": "matematica-e-raciocinio-logico-regra-de-tres", "title": "Regra de Três", "explain": "Regra de três simples resolve problemas com duas grandezas; composta envolve três ou mais. Monte a tabela, identifique se cada grandeza é direta ou inversamente proporcional à incógnita e só depois multiplique. Nunca resolva automaticamente sem analisar a relação: mais trabalhadores podem significar menos tempo, logo relação inversa.", "summary": "Antes de calcular, classifique cada grandeza como direta ou inversa.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Regra de Três?", "a": "Antes de calcular, classifique cada grandeza como direta ou inversa."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Regra+de+Três+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Regra+de+Três+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Regra+de+Três+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Regra+de+Três+concurso+PMBA"}]}, {"id": "matematica-e-raciocinio-logico-porcentagem", "title": "Porcentagem", "explain": "Porcentagem é fração de denominador 100. 20% = 20/100 = 0,20. Para calcular aumento, multiplique por 1 + taxa; para desconto, por 1 - taxa. Cuidado com aumentos e descontos sucessivos: 20% de desconto e 20% de aumento não voltam ao valor inicial. Em prova, use fator multiplicativo para ganhar velocidade.", "summary": "Use fator: aumento 15% = ×1,15; desconto 15% = ×0,85.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Porcentagem?", "a": "Use fator: aumento 15% = ×1,15; desconto 15% = ×0,85."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "V studada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Princípios Fundamentais?", "a": "Fundamentos: SO-CI-DI-VA-PLU; objetivos e relações internacionais são muito cobrados."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Constituição Federal", "url": "https://www.planalto.gov.br/ccivil_03.old/constituicao/constituicao.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Princípios+Fundamentais+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Princípios+Fundamentais+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Princípios+Fundamentais+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Princípios+Fundamentais+concurso+PMBA"}]}, {"id": "direito-constitucional-direitos-e-garantias-fundamentais", "title": "Direitos e Garantias Fundamentais", "explain": "Direitos fundamentais limitam o poder estatal e protegem a pessoa. O art. 5º concentra direitos individuais e coletivos: vida, liberdade, igualdade, segurança e propriedade. Diferencie direito de garantia: direito é o bem protegido; garantia é instrumento de proteção, como habeas corpus, mandado de segurança e habeas data. Atenção à literalidade constitucional.", "summary": "Direito é o bem; garantia é o instrumento de defesa.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "f oncurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Direitos+Políticos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Direitos+Políticos+concurso+PMBA"}]}, {"id": "direito-constitucional-organizacao-do-estado", "title": "Organização do Estado", "explain": "A organização do Estado brasileiro envolve União, Estados, Distrito Federal e Municípios, todos autônomos. Revise repartição de competências, bens públicos e características da federação. Autonomia não é soberania: soberania pertence à República Federativa do Brasil no plano internacional.", "summary": "Entes federativos têm autonomia; soberania é do Estado brasileiro.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Organização do Estado?", "a": "Entes federativos têm autonomia; soberania é do Estado brasileiro."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Constituição Federal", "url": "https://www.planalto.gov.br/ccivil_03.old/constituicao/constituicao.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Organização+do+Estado+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Organização+do+Estado+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Organização+do+Estado+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Organização+do+Estado+concurso+PMBA"}]}, {"id": "direito-constitucional-administracao-publica-art-37", "title": "Administração Pública Art. 37", "explain": "O art. 37 traz princípios expressos da Administração Pública: legalidade, impessoalidade, moralidade, publicidade e eficiência. Também trata de concurso público, cargos, funções, remuneração, acumulação e responsabilidade. A banca gosta do mnemônico LIMPE e da diferença entre princípio expresso e implícito.", "summary": "LIMPE: Legalidade, Impessoalidade, Moralidade, Publicidade e Eficiência.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Administração Pública Art. 37?", "a": "LIMPE: Legalidade, Impessoalidade, Moralidade, Publicidade e Eficiência."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Constituição Federal", "url": "https://www.planalto.gov.br/ccivil_03.old/constituicao/constituicao.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Administração+Pública+Art.+37+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Administração+Pública+Art.+37+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Administração+Pública+Art.+37+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Administração+Pública+Art.+37+concurso+PMBA"}]}, {"id": "direito-constitucional-seguranca-publica-art-144", "title": "Segurança Pública Art. 144", "explain": "O art. 144 trata da segurança pública como dever do Estado, direito e responsabilidade de todos. Lista órgãos de segurança, como Polícia Federal, Rodoviária Federal, Ferroviária Federal, polícias civis, polícias militares e corpos de bombeiros militares, polícias penais federal, estaduais e distrital. Para PM, destaque policiamento ostensivo e preservação da ordem pública.", "summary": "PM realiza polícia ostensiva e preservação da ordem pública.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Segurança Pública Art. 144?", "a": "PM realiza polícia ostensiva e preservação da ordem pública."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Constituição Federal", "url": "https://www.planalto.gov.br/ccivil_03.old/constituicao/constituicao.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Segurança+Pública+Art.+144+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Segurança+Pública+Art.+144+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Segurança+Pública+Art.+144+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Segurança+Pública+Art.+144+concurso+PMBA"}]}, {"id": "direito-constitucional-remedios-constitucionais", "title": "Remédios Constitucionais", "explain": "Remédios constitucionais protegem direitos: habeas corpus protege liberdade de locomoção; mandado de segurança protege direito líquido e certo; habeas data protege acesso/retificação de dados; mandado de injunção supre falta de norma regulamentadora; ação popular protege patrimônio público, moralidade, meio ambiente e patrimônio histórico-cultural.", "summary": "Associe cada remédio ao direito protegido.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Remédios Constitucionais?", "a": "Associe cada remédio ao direito protegido."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Constituição Federal", "url": "https://www.planalto.gov.br/ccivil_03.old/constituicao/constituicao.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Remédios+Constitucionais+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Remédios+Constitucionais+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Remédios+Constitucionais+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Remédios+Constitucionais+concurso+PMBA"}]}]}, {"name": "Direito Penal", "icon": "🚓", "color": "#ef4444", "topics": [{"id": "direito-penal-principios-do-direito-penal", "title": "Princípios do Direito Penal", "explain": "Princípios penais limitam o poder punitivo. Legalidade: não há crime nem pena sem lei anterior. Anterioridade, taxatividade, culpabilidade, intervenção mínima, fragmentariedade, humanidade das penas e individualização são essenciais. Em prova, relacione princípio à consequência prática: analogia não pode criar crime contra o réu; lei penal deve ser clara e anterior.", "summary": "Legalidade e anterioridade são base: crime e pena exigem lei anterior.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Princípios do Direito Penal?", "a": "Legalidade e anterioridade são base: crime e pena exigem lei anterior."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Princípios+do+Direito+Penal+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Princípios+do+Direito+Penal+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Princípios+do+Direito+Penal+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Princípios+do+Direito+Penal+concurso+PMBA"}]}, {"id": "direito-penal-aplicacao-da-lei-penal-no-tempo", "title": "Aplicação da Lei Penal no Tempo", "explain": "A regra é tempus regit actum: aplica-se a lei vigente no momento do fato. Exceção: lei penal mais benéfica retroage. Lei mais grave não retroage. Abolitio criminis extingue punibilidade e efeitos penais. Novatio legis in mellius melhora a situação do réu e também retroage.", "summary": "Lei mais benéfica retroage; lei mais grave não retroage.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Aplicação da Lei Penal no Tempo?", "a": "Lei mais benéfica retroage; lei mais grave não retroage."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Aplicação+da+Lei+Penal+no+Tempo+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Aplicação+da+Lei+Penal+no+Tempo+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Aplicação+da+Lei+Penal+no+Tempo+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Aplicação+da+Lei+Penal+no+Tempo+concurso+PMBA"}]}, {"id": "direito-penal-aplicacao-da-lei-penal-no-espaco", "title": "Aplicação da Lei Penal no Espaço", "explain": "A lei penal brasileira aplica-se, em regra, aos crimes cometidos no território nacional. Estude territorialidade, extraterritorialidade, lugar do crime pela teoria da ubiquidade e hipóteses do art. 7º do Código Penal. Para o CP, considera-se praticado o crime no lugar da ação/omissão e onde ocorreu ou deveria ocorrer o resultado.", "summary": "Lugar do crime no CP: teoria da ubiquidade.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Aplicação da Lei Penal no Espaço?", "a": "Lugar do crime no CP: teoria da ubiquidade."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Aplicação+da+Lei+Penal+no+Espaço+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Aplicação+da+Lei+Penal+no+Espaço+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Aplicação+da+Lei+Penal+no+Espaço+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Aplicação+da+Lei+Penal+no+Espaço+concurso+PMBA"}]}, {"id": "direito-penal-teoria-do-crime", "title": "Teoria do Crime", "explain": "Crime pode ser estudado como fato típico, ilícito e culpável. Fato típico envolve conduta, resultado, nexo causal e tipicidade. Ilicitude é contrariedade ao direito. Culpabilidade envolve imputabilidade, potencial consciência da ilicitude e exigibilidade de conduta diversa. A prova costuma cobrar estrutura e excludentes.", "summary": "Crime: fato típico + ilicitude + culpabilidade.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Teoria do Crime?", "a": "Crime: fato típico + ilicitude + culpabilidade."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Teoria+do+Crime+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Teoria+do+Crime+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Teoria+do+Crime+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Teoria+do+Crime+concurso+PMBA"}]}, {"id": "direito-penal-dolo-e-culpa", "title": "Dolo e Culpa", "explain": "Dolo é vontade consciente de realizar o tipo penal ou assumir o risco do resultado. Culpa ocorre por imprudência, negligência ou imperícia, quando não há intenção, mas há violação do dever de cuidado. Dolo eventual: assume o risco; culpa consciente: prevê o resultado, mas acredita sinceramente que não ocorrerá.", "summary": "Dolo eventual assume o risco; culpa consciente confia que evitará o resultado.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Dolo e Culpa?", "a": "Dolo eventual assume o risco; culpa consciente confia que evitará o resultado."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Dolo+e+Culpa+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Dolo+e+Culpa+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Dolo+e+Culpa+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Dolo+e+Culpa+concurso+PMBA"}]}, {"id": "direito-penal-erro-de-tipo-e-erro-de-proibicao", "title": "Erro de Tipo e Erro de Proibição", "explain": "Erro de tipo recai sobre elemento do tipo penal e pode excluir dolo. Erro de proibição recai sobre a ilicitude do fato: a pessoa sabe o que faz, mas acredita que é permitido. Se inevitável, exclui culpabilidade; se evitável, pode reduzir pena. Diferenciar os dois é muito cobrado.", "summary": "Erro de tipo afeta conhecimento do fato; erro de proibição afeta consciência da ilicitude.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Erro de Tipo e Erro de Proibição?", "a": "Erro de tipo afeta conhecimento do fato; erro de proibição afeta consciência da ilicitude."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Erro+de+Tipo+e+Erro+de+Proibição+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Erro+de+Tipo+e+Erro+de+Proibição+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Erro+de+Tipo+e+Erro+de+Proibição+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Erro+de+Tipo+e+Erro+de+Proibição+concurso+PMBA"}]}, {"id": "direito-penal-excludentes-de-ilicitude", "title": "Excludentes de Ilicitude", "explain": "Excludentes de ilicitude afastam a antijuridicidade: estado de necessidade, legítima defesa, estrito cumprimento do dever legal e exercício regular de direito. Na legítima defesa, há agressão injusta atual ou iminente, uso moderado dos meios necessários e proteção de direito próprio ou alheio.", "summary": "Legítima defesa exige agressão injusta atual/iminente e moderação.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Excludentes de Ilicitude?", "a": "Legítima defesa exige agressão injusta atual/iminente e moderação."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Excludentes+de+Ilicitude+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Excludentes+de+Ilicitude+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Excludentes+de+Ilicitude+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Excludentes+de+Ilicitude+concurso+PMBA"}]}, {"id": "direito-penal-iter-criminis-e-tentativa", "title": "Iter Criminis e Tentativa", "explain": "Iter criminis é o caminho do crime: cogitação, preparação, execução e consumação. Em regra, cogitação e preparação não são puníveis, salvo quando constituem crime autônomo. Tentativa ocorre quando iniciada a execução, o crime não se consuma por circunstâncias alheias à vontade do agente.", "summary": "Tentativa começa na execução e não consuma por causa externa à vontade.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Iter Criminis e Tentativa?", "a": "Tentativa começa na execução e não consuma por causa externa à vontade."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Iter+Criminis+e+Tentativa+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Iter+Criminis+e+Tentativa+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Iter+Criminis+e+Tentativa+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Iter+Criminis+e+Tentativa+concurso+PMBA"}]}, {"id": "direito-penal-concurso-de-pessoas", "title": "Concurso de Pessoas", "explain": "Concurso de pessoas ocorre quando duas ou mais pessoas concorrem para o crime. Requisitos: pluralidade de agentes, relevância causal das condutas, vínculo subjetivo e identidade de infração. Autor executa o núcleo do tipo; partícipe auxilia, induz ou instiga. A participação deve ser dolosa.", "summary": "Exige vínculo subjetivo e contribuição relevante para o crime.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Concurso de Pessoas?", "a": "Exige vínculo subjetivo e contribuição relevante para o crime."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Concurso+de+Pessoas+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Concurso+de+Pessoas+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Concurso+de+Pessoas+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Concurso+de+Pessoas+concurso+PMBA"}]}, {"id": "direito-penal-crimes-contra-a-vida", "title": "Crimes Contra a Vida", "explain": "Crimes contra a vida incluem homicídio, induzimento/instigação/auxílio ao suicídio ou automutilação, infanticídio e aborto. Homicídio pode ser simples, privilegiado ou qualificado. Observe qualificadoras, causas de aumento e competência do Tribunal do Júri para crimes dolosos contra a vida.", "summary": "Homicídio doloso vai ao Tribunal do Júri.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Crimes Contra a Vida?", "a": "Homicídio doloso vai ao Tribunal do Júri."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Crimes+Contra+a+Vida+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Crimes+Contra+a+Vida+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Crimes+Contra+a+Vida+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Crimes+Contra+a+Vida+concurso+PMBA"}]}, {"id": "direito-penal-crimes-contra-a-honra", "title": "Crimes Contra a Honra", "explain": "Calúnia é imputar falsamente fato definido como crime. Difamação é imputar fato ofensivo à reputação. Injúria ofende dignidade ou decoro, sem imputar fato específico. Diferencie: crime falso = calúnia; fato desonroso = difamação; xingamento/qualidade negativa = injúria.", "summary": "Calúnia: crime falso; difamação: fato ofensivo; injúria: ofensa pessoal.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Crimes Contra a Honra?", "a": "Calúnia: crime falso; difamação: fato ofensivo; injúria: ofensa pessoal."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Fonte oficial: Código Penal", "url": "https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm"}, {"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Crimes+Contra+a+Honra+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Crimes+Contra+a+Honra+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Crimes+Contra+a+Honra+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Crimes+Contra+a+Honra+concurso+PMBA"}]}]}, {"name": "Direito Administrativo", "icon": "🏛️", "color": "#06b6d4", "topics": [{"id": "direito-administrativo-principios-administrativos", "title": "Princípios Administrativos", "explain": "Direito Administrativo regula a função administrativa do Estado. Princípios expressos do art. 37: legalidade, impessoalidade, moralidade, publicidade e eficiência. Também existem princípios implícitos: supremacia do interesse público, indisponibilidade do interesse público, razoabilidade, proporcionalidade, continuidade do serviço público, autotutela e motivação.", "summary": "LIMPE + princípios implícitos formam base da matéria.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Princípios Administrativos?", "a": "LIMPE + princípios implícitos formam base da matéria."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_quer url": "https://www.tecconcursos.com.br/questoes/?q=Poderes+Administrativos+concurso+PMBA"}]}, {"id": "direito-administrativo-atos-administrativos", "title": "Atos Administrativos", "explain": "Ato administrativo é manifestação unilateral da Administração sob regime público. Elementos: competência, finalidade, forma, motivo e objeto. Atributos: presunção de legitimidade, imperatividade, autoexecutoriedade e tipicidade. Revise anulação, revogação e convalidação.", "summary": "Elementos: CO-FI-FO-MO-OB; atributos variam conforme o ato.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Atos Administrativos?", "a": "Elementos: CO-FI-FO-MO-OB; atributos variam conforme o ato."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Atos+Administrativos+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Atos+Administrativos+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Atos+Administrativos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Atos+Administrativos+concurso+PMBA"}]}, {"id": "direito-administrativo-servicos-publicos", "title": "Serviços Públicos", "explain": "Serviço público é atividade prestada pelo Estado ou por delegados para satisfazer necessidades coletivas. Princípios: continuidade, modicidade, igualdade, eficiência, atualidade e generalidade. Pode ser prestado diretamente ou por concessão, permissão e autorização.", "summary": "Serviço público deve atender interesse coletivo com continuidade e eficiência.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Serviços Públicos?", "a": "Serviço público deve atender interesse coletivo com continuidade e eficiência."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Serviços+Públicos+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Serviços+Públicos+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Serviços+Públicos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Serviços+Públicos+concurso+PMBA"}]}, {"id": "direito-administrativo-agentes-publicos", "title": "Agentes Públicos", "explain": "Agente público é toda pessoa que exerce função pública, ainda que temporariamente ou sem remuneração. Inclui agentes políticos, servidores públicos, empregados públicos, temporários e particulares em colaboração. Revise cargo, emprego, função, provimento, vacância, acumulação e responsabilidade.", "summary": "Agente público é conceito amplo: qualquer pessoa exercendo função pública.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Agentes Públicos?", "a": "Agente público é conceito amplo: qualquer pessoa exercendo função pública."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "https://www.youtube.com/results?search_query=Agentes+Públicos+concurso+PMBA+aula+concurso"}, {"label": "PDFs e apostilas no Google", "url": "https://www.google.com/search?q=Agentes+Públicos+concurso+pdf"}, {"label": "Questões no Qconcursos", "url": "https://www.qconcursos.com/questoes-de-concursos/questoes?keyword=Agentes+Públicos+concurso+PMBA"}, {"label": "Questões no Tec Concursos", "url": "https://www.tecconcursos.com.br/questoes/?q=Agentes+Públicos+concurso+PMBA"}]}, {"id": "direito-administrativo-responsabilidade-civil-do-estado", "title": "Responsabilidade Civil do Estado", "explain": "O Estado responde objetivamente pelos danos que seus agentes causarem a terceiros nessa qualidade, com base na teoria do risco administrativo. A vítima prova dano e nexo causal; o Estado pode buscar regresso contra o agente se houver dolo ou culpa. Excludentes podem romper ou reduzir o nexo.", "summary": "Responsabilidade objetiva do Estado; regresso contra agente exige dolo ou culpa.", "checklist": ["Teoria estudada", "Resumo revisado", "20 questões resolvidas", "Erros revisados", "Flashcards criados", "Revisão 24h", "Revisão 7 dias", "Revisão 30 dias"], "flashcards": [{"q": "Qual é a ideia central de Responsabilidade Civil do Estado?", "a": "Responsabilidade objetiva do Estado; regresso contra agente exige dolo ou culpa."}, {"q": "Qual é o erro mais comum em prova?", "a": "Responder pela intuição sem conferir conceito, comando da questão e exceções."}, {"q": "Como revisar este assunto?", "a": "Leia o resumo, faça questões, registre erros e transforme exceções em flashcards."}], "links": [{"label": "Videoaulas no YouTube", "url": "h let page='dashboard';
const storeKey='pmba_studyos_v4';
const state = JSON.parse(localStorage.getItem(storeKey)||'{}');
function save(){localStorage.setItem(storeKey,JSON.stringify(state)); updateProgress();}
function get(k,d=''){return state[k]??d}
function set(k,v){state[k]=v; save();}
function allTopics(){return DATA.flatMap(s=>s.topics.map(t=>({...t, subject:s.name, icon:s.icon, color:s.color})));}
function updateProgress(){const topics=allTopics(); let total=0,done=0; topics.forEach(t=>t.checklist.forEach((c,i)=>{total++; if(get('chk_'+t.id+'_'+i,false)) done++;})); const p=total?Math.round(done/total*100):0; document.getElementById('sidePercent').textContent=p+'%'; document.getElementById('sideFill').style.width=p+'%'; const f=document.getElementById('dashFill'); if(f)f.style.width=p+'%'; const d=document.getElementById('dashPercent'); if(d)d.textContent=p+'%'; const dc=document.getElementById('doneCount'); if(dc)dc.textContent=done;}
function setPage(p,btn){page=p; document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); if(btn)btn.classList.add('active'); render();}
function render(){const titles={dashboard:['Painel','Visão geral do seu estudo para a Polícia Militar da Bahia.'],conteudos:['Conteúdos PMBA','Clique em qualquer assunto para abrir explicação, resumo, links, flashcards e caderno de erros.'],erros:['Caderno de Erros','Todos os erros anotados por assunto em um só lugar.'],fontes:['Fontes e Questões','Links-base para estudar por lei seca, PDF, videoaulas e questões.']}; document.getElementById('pageTitle').textContent=titles[page][0]; document.getElementById('pageDesc').textContent=titles[page][1]; if(page==='dashboard')renderDashboard(); if(page==='conteudos')renderContents(); if(page==='erros')renderErrors(); if(page==='fontes')renderFontes(); updateProgress();}
function renderDashboard(){const topics=allTopics(); const totalTopics=topics.length; const subjects=DATA.length; const notes=Object.keys(state).filter(k=>k.startsWith('notes_')&&state[k]).length; document.getElementById('content').innerHTML=`<div class="grid"><div class="card metric"><span>Matérias</span><b>${subjects}</b></div><div class="card metric"><span>Assuntos</span><b>${totalTopics}</b></div><div class="card metric"><span>Anotações feitas</span><b>${notes}</b></div><div class="card metric"><span>Progresso</span><b id="dashPercent">0%</b><div class="bar"><div id="dashFill" class="fill"></div></div></div></div><div class="today"><div class="card"><h3>Estudo livre do dia</h3><p style="color:var(--muted)">Escolha uma matéria conforme sua energia e necessidade. Sem cronograma engessado.</p><div class="tools"><button class="toolbtn" onclick="setPage('conteudos',document.querySelectorAll('.nav button')[1])">Abrir conteúdos</button><button class="toolbtn" onclick="randomTopic()">Sortear assunto</button></div><div id="randomBox"></div></div><div class="card"><h3>Revisões pendentes</h3><div id="reviewBox"></div></div></div>`; renderReviews();}
function renderReviews(){const box=document.getElementById('reviewBox'); if(!box)return; const arr=[]; allTopics().forEach(t=>t.checklist.forEach((c,i)=>{if(c.includes('Revisão')&&!get('chk_'+t.id+'_'+i,false)) arr.push(`<span class="pill">${c} · ${t.title}</span>`)})); box.innerHTML=arr.slice(0,12).join('')||'<p class="empty">Nenhuma revisão pendente.</p>';}
function randomTopic(){const list=allTopics(); const t=list[Math.floor(Math.random()*list.length)]; document.getElementById('randomBox').innerHTML=`<div class="topic" onclick="openTopic('${t.id}')"><div><b>${t.title}</b><br><small>${t.subject}</small></div><span>abrir →</span></div>`;}
function renderContents(){const q=(document.getElementById('search').value||'').toLowerCase(); let html='<div class="subjects">'; DATA.forEach(s=>{const topics=s.topics.filter(t=>(s.name+' '+t.title+' '+t.summary+' '+t.explain).toLowerCase().includes(q)); if(!topics.length)return; html+=`<div class="card subject-card"><div class="subject-head"><h3>${s.icon} ${s.name}</h3><span class="badge">${topics.length} assuntos</span></div>`; topics.forEach(t=>{const done=t.checklist.filter((c,i)=>get('chk_'+t.id+'_'+i,false)).length; html+=`<div class="topic" onclick="openTopic('${t.id}')"><div><b>${t.title}</b><br><small>${done}/${t.checklist.length} etapas concluídas</small></div><span>→</span></div>`;}); html+='</div>';}); html+='</div>'; document.getElementById('content').innerHTML=html;}
function findTopic(id){for(const s of DATA) for(const t of s.topics) if(t.id===id) return {...t,subject:s.name,icon:s.icon,color:s.color};}
function openTopic(id){const t=findTopic(id); const links=t.links.map(l=>`<a href="${l.url}" target="_blank">${l.label}</a>`).join(''); const checks=t.checklist.map((c,i)=>`<label class="checkrow"><input type="checkbox" ${get('chk_'+t.id+'_'+i,false)?'checked':''} onchange="set('chk_${t.id}_${i}',this.checked)"><span>${c}</span></label>`).join(''); const flashes=t.flashcards.map((f,i)=>`<div class="flash"><b>${i+1}. ${f.q}</b><span>${f.a}</span></div>`).join(''); document.getElementById('sheet').innerHTML=`<div class="sheetTop"><div><span class="pill">${t.icon} ${t.subject}</span><h2>${t.title}</h2><p style="color:var(--muted)">${t.summary}</p></div><button class="close" onclick="closeDrawer()">Fechar</button></div><div class="section"><h4>📖 Explicação completa</h4><p style="line-height:1.75">${t.explain}</p></div><div class="section"><h4>📝 Resumo pronto</h4><p>${t.summary}</p></div><div class="section"><h4>✅ Checklist de domínio</h4>${checks}</div><div class="section"><h4>🔗 Fontes, videoaulas, PDFs e questões</h4><div class="linklist">${links}</div></div><div class="section"><h4>⚡ Flashcards iniciais</h4>${flashes}<textarea placeholder="Crie seus próprios flashcards aqui..." oninput="set('flash_${t.id}',this.value)">${get('flash_'+t.id)}</textarea></div><div class="section"><h4>✍️ Minhas anotações</h4><textarea placeholder="Escreva suas anotações, macetes, dúvidas e resumos pessoais..." oninput="set('notes_${t.id}',this.value)">${get('notes_'+t.id)}</textarea></div><div class="section"><h4>🧠 Caderno de erros</h4><textarea placeholder="Cole aqui questões que errou, motivo do erro e regra correta..." oninput="set('err_${t.id}',this.value)">${get('err_'+t.id)}</textarea></div>`; document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open'); if(page==='conteudos')renderContents();}
document.getElementById('drawer').addEventListener('click',e=>{if(e.target.id==='drawer')closeDrawer();});
function renderErrors(){let html='<div class="card">'; const errors=allTopics().map(t=>[t,get('err_'+t.id)]).filter(x=>x[1]); if(!errors.length) html+='<p class="empty">Nenhum erro registrado ainda. Abra um assunto e preencha o caderno de erros.</p>'; else errors.forEach(([t,e])=>{html+=`<div class="section"><h4>${t.subject} · ${t.title}</h4><p style="white-space:pre-wrap">${e}</p><button class="toolbtn" onclick="openTopic('${t.id}')">Abrir assunto</button></div>`;}); html+='</div>'; document.getElementById('content').innerHTML=html;}
function renderFontes(){const links=Object.entries(BASE_LINKS).map(([k,u])=>`<a href="${u}" target="_blank">${k}</a>`).join(''); document.getElementById('content').innerHTML=`<div class="card"><h3>Fontes-base</h3><p style="color:var(--muted)">Use estes links como ponto de partida. Dentro de cada assunto também há links específicos de videoaulas, PDFs e questões.</p><div class="linklist">${links}</div></div>`;}
render();
</script>
</body>
</html>
